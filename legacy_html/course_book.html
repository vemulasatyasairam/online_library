<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Book Details - Course</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%); min-height: 100vh; padding: 20px; }
    .header { background-color: #0891b2; color: white; padding: 20px; display: flex; align-items: center; gap: 20px; border-radius: 8px 8px 0 0; }
    .header a { color: white; text-decoration: none; font-size: 24px; cursor: pointer; }
    .header h2 { flex: 1; font-size: 24px; margin: 0; }
    .container { max-width: 900px; margin: 0 auto; }
    .book-detail-card { background: white; border-radius: 8px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); overflow: hidden; }
    .book-content { display: grid; grid-template-columns: 280px 1fr; gap: 40px; padding: 40px; }
    .book-cover { position: relative; }
    .book-cover img { width: 100%; height: 380px; object-fit: cover; border-radius: 8px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15); }
    .book-info { display: flex; flex-direction: column; gap: 20px; }
    .book-title { font-size: 32px; font-weight: 700; color: #1a202c; line-height: 1.2; }
    .book-meta { display: flex; flex-wrap: wrap; gap: 20px; }
    .meta-item { display: flex; flex-direction: column; }
    .meta-label { font-size: 12px; color: #718096; font-weight: 600; text-transform: uppercase; }
    .meta-value { font-size: 16px; color: #2d3748; font-weight: 500; margin-top: 4px; }
    .divider { height: 1px; background-color: #e2e8f0; margin: 10px 0; }
    .description { color: #4a5568; font-size: 15px; line-height: 1.6; margin: 10px 0; }
    .details-section { margin: 20px 0; }
    .details-section h3 { font-size: 16px; font-weight: 600; color: #2d3748; margin-bottom: 12px; }
    .details-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .detail-item { padding: 12px; background-color: #f7fafc; border-left: 3px solid #0891b2; border-radius: 4px; }
    .detail-item label { font-size: 12px; color: #718096; font-weight: 600; text-transform: uppercase; }
    .detail-item value { display: block; font-size: 14px; color: #2d3748; margin-top: 4px; font-weight: 500; }
    .features-list { background: #cffafe; padding: 20px; border-radius: 8px; }
    .features-list ul { list-style: none; margin: 0; padding: 0; }
    .features-list li { padding: 8px 0 8px 24px; position: relative; color: #4a5568; }
    .features-list li:before { content: "\2713"; position: absolute; left: 0; color: #0891b2; font-weight: bold; }
    .toc-list { background: #e0f2fe; padding: 20px; border-radius: 8px; }
    .toc-list ol { margin: 0; padding-left: 20px; color: #4a5568; }
    .toc-list li { padding: 6px 0; }
    .actions { display: flex; gap: 12px; margin-top: 20px; }
    .btn { flex: 1; padding: 14px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.3s ease; }
    .btn.open { background: #0891b2; color: white; }
    .btn.open:hover { background: #0e7490; transform: translateY(-2px); }
    .btn.save { background: #10b981; color: white; }
    .btn.save:hover { background: #059669; transform: translateY(-2px); }
    .message { margin-top: 12px; padding: 12px; border-radius: 6px; text-align: center; font-weight: 500; }
    .message.success { background-color: #d1fae5; color: #065f46; }
    .message.error { background-color: #fee2e2; color: #991b1b; }
    .warning-banner { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .warning-banner-header { display: flex; gap: 12px; font-weight: 700; align-items: center; }
    .warning-banner-icon { font-size: 24px; }
    .not-found { text-align: center; padding: 60px 20px; }
    @media (max-width: 768px) { .book-content { grid-template-columns: 1fr; } .details-list { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <a href="course_books.html">&larr;</a>
    <h2>📚 Course Book Details</h2>
  </div>
  <div class="container">
    <div class="book-detail-card">
      <div id="notFound" class="not-found" style="display:none;">
        <h1>Book Not Found</h1>
        <a href="course_books.html">Back to Course Books</a>
      </div>
      <div id="bookContainer" style="display:none;">
        <div class="book-content">
          <div class="book-cover">
            <img id="bookImage" src="" alt="Book Cover">
          </div>
          <div class="book-info">
            <h1 class="book-title" id="title">Title</h1>
            <div class="book-meta">
              <div class="meta-item">
                <span class="meta-label">Author</span>
                <span class="meta-value" id="author">Unknown</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">Subject</span>
                <span class="meta-value" id="subject">General</span>
              </div>
            </div>
            <div class="divider"></div>
            <div class="description" id="description"></div>
            <div class="details-section">
              <h3>📖 Publication Details</h3>
              <div class="details-list">
                <div class="detail-item"><label>Publisher</label><value id="publisher">-</value></div>
                <div class="detail-item"><label>Year</label><value id="year">-</value></div>
                <div class="detail-item"><label>Edition</label><value id="edition">-</value></div>
                <div class="detail-item"><label>Pages</label><value id="pages">-</value></div>
                <div class="detail-item"><label>Language</label><value id="language">-</value></div>
                <div class="detail-item"><label>ISBN</label><value id="isbn">-</value></div>
              </div>
            </div>
            <div class="details-section features-list" id="featuresSection" style="display:none;">
              <h3>✨ Learning Outcomes</h3>
              <ul id="featuresList"></ul>
            </div>
            <div class="details-section toc-list" id="tocSection" style="display:none;">
              <h3>📝 Chapters</h3>
              <ol id="tocList"></ol>
            </div>
            <div class="warning-banner">
              <div class="warning-banner-header">
                <span class="warning-banner-icon">⚠️</span>
                <span>Educational Use Only - NOT FOR COMMERCIAL PURPOSE</span>
              </div>
            </div>
            <div class="actions">
              <button id="openBtn" class="btn open">📖 Open</button>
              <button id="saveBtn" class="btn save">⭐ Save to My Books</button>
            </div>
            <div id="msg" class="message"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const books = {
      course1: { id: 'course1', title: 'Python Basics', author: 'Mark Lutz', subject: 'Programming', publisher: 'O\'Reilly Media', year: 2013, edition: 'Fifth Edition', pages: 1600, language: 'English', isbn: '978-1491927281', book_cover: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=400&fit=crop', description: 'Learning Python is an introduction to Python designed specifically for people with no programming experience. This book teaches core concepts of Python programming language with practical examples and exercises.', features: ['Python language fundamentals', 'Object-oriented programming', 'Built-in data structures', 'Exception handling', 'Functional programming', 'Module and package system', 'File I/O operations', 'Practical coding exercises'], toc: ['Chapter 1 - A Python Q&A', 'Chapter 2 - How Python Runs Your Code', 'Chapter 3 - How You Run Programs', 'Chapter 4 - Introducing Python Object Types', 'Chapter 5 - Numbers', 'Chapter 6 - Strings'] },
      course2: { id: 'course2', title: 'Advanced Python', author: 'Luciano Ramalho', subject: 'Programming', publisher: 'O\'Reilly Media', year: 2015, edition: 'First Edition', pages: 800, language: 'English', isbn: '978-1491927269', book_cover: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=400&fit=crop', description: 'Fluent Python teaches advanced Python techniques including metaprogramming, decorators, and design patterns. This book is perfect for intermediate Python programmers looking to master advanced concepts.', features: ['Python data model', 'Sequence protocols', 'Dictionary and set', 'Text and bytes', 'Functions design', 'Classes and protocols', 'Async programming', 'Design patterns'], toc: ['Chapter 1 - The Python Data Model', 'Chapter 2 - An Array of Sequences', 'Chapter 3 - Dictionaries and Sets', 'Chapter 4 - Text Versus Bytes', 'Chapter 5 - First-Class Functions', 'Chapter 6 - Design Patterns'] },
      course3: { id: 'course3', title: 'Web Development Fundamentals', author: 'Jon Duckett', subject: 'Web Development', publisher: 'Indie Pub', year: 2014, edition: 'First Edition', pages: 880, language: 'English', isbn: '978-1491927297', book_cover: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=400&fit=crop', description: 'Comprehensive guide to HTML, CSS, and JavaScript for building interactive web applications. This book covers modern web development practices with visual learning approach.', features: ['HTML structure and semantics', 'CSS styling and layouts', 'JavaScript programming', 'DOM manipulation', 'Responsive design', 'Web accessibility', 'Performance optimization', 'Cross-browser compatibility'], toc: ['Chapter 1 - Structure', 'Chapter 2 - Text', 'Chapter 3 - Lists', 'Chapter 4 - Links', 'Chapter 5 - Images', 'Chapter 6 - Tables'] },
      course4: { id: 'course4', title: 'React: The Complete Guide', author: 'David Ceddia', subject: 'Frontend Framework', publisher: 'Self Published', year: 2018, edition: 'Second Edition', pages: 650, language: 'English', isbn: '978-1491959909', book_cover: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=400&fit=crop', description: 'Complete guide to building modern web applications with React. Learn about components, hooks, state management, and best practices for React development.', features: ['React fundamentals', 'Component lifecycle', 'React hooks', 'State management', 'Props and composition', 'Event handling', 'Conditional rendering', 'Real-world projects'], toc: ['Chapter 1 - React Basics', 'Chapter 2 - Components', 'Chapter 3 - JSX', 'Chapter 4 - State and Props', 'Chapter 5 - Hooks', 'Chapter 6 - Context API'] },
      course5: { id: 'course5', title: 'Java Programming', author: 'Herbert Schildt', subject: 'Programming', publisher: 'McGraw-Hill', year: 2014, edition: 'Fourth Edition', pages: 1200, language: 'English', isbn: '978-0071808552', book_cover: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=400&fit=crop', description: 'Complete reference guide to Java programming. Covers everything from basic syntax to advanced features including generics, annotations, and concurrency.', features: ['Java fundamentals', 'Object-oriented programming', 'Exception handling', 'Arrays and collections', 'Threads and concurrency', 'File I/O', 'Generics and wildcards', 'Annotations'], toc: ['Chapter 1 - Java Fundamentals', 'Chapter 2 - Data Types and Variables', 'Chapter 3 - Operators', 'Chapter 4 - Control Statements', 'Chapter 5 - Class Fundamentals', 'Chapter 6 - Object-Oriented Programming'] },
      course6: { id: 'course6', title: 'Database Design & SQL', author: 'C.J. Date', subject: 'Databases', publisher: 'Addison-Wesley', year: 2012, edition: 'Fifth Edition', pages: 960, language: 'English', isbn: '978-0321884496', book_cover: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&h=400&fit=crop', description: 'Authoritative guide to relational database design and SQL programming. Learn best practices for database architecture, normalization, and query optimization.', features: ['Relational model concepts', 'Database design principles', 'Normalization', 'SQL fundamentals', 'Query optimization', 'Transactions and concurrency', 'Database administration', 'Real-world case studies'], toc: ['Chapter 1 - Introduction to SQL', 'Chapter 2 - Tables', 'Chapter 3 - Data Retrieval', 'Chapter 4 - Data Manipulation', 'Chapter 5 - Joins', 'Chapter 6 - Subqueries'] },
    };

    const bookId = new URLSearchParams(location.search).get('id');
    const book = books[bookId];

    if (!book) {
      document.getElementById('notFound').style.display = 'block';
    } else {
      document.getElementById('bookContainer').style.display = 'block';
      document.getElementById('title').textContent = book.title;
      document.getElementById('author').textContent = book.author;
      document.getElementById('subject').textContent = book.subject;
      document.getElementById('description').textContent = book.description;
      document.getElementById('publisher').textContent = book.publisher;
      document.getElementById('year').textContent = book.year;
      document.getElementById('edition').textContent = book.edition;
      document.getElementById('pages').textContent = book.pages + ' Pages';
      document.getElementById('language').textContent = book.language;
      document.getElementById('isbn').textContent = book.isbn;
      document.getElementById('bookImage').src = book.book_cover;

      if (book.features) {
        document.getElementById('featuresList').innerHTML = book.features.map(f => `<li>${f}</li>`).join('');
        document.getElementById('featuresSection').style.display = 'block';
      }
      if (book.toc) {
        document.getElementById('tocList').innerHTML = book.toc.map(c => `<li>${c}</li>`).join('');
        document.getElementById('tocSection').style.display = 'block';
      }

      document.getElementById('saveBtn').addEventListener('click', () => {
        const email = localStorage.getItem('currentUser');
        if (!email) { location.href = 'login.html'; return; }
        const key = `saved_${email}`;
        const saved = JSON.parse(localStorage.getItem(key) || '[]');
        if (saved.find(b => b.id === book.id)) {
          showMsg('Already saved', 'error');
        } else {
          saved.push(book);
          localStorage.setItem(key, JSON.stringify(saved));
          showMsg('✓ Saved successfully!', 'success');
        }
      });

      function showMsg(text, type) {
        const msg = document.getElementById('msg');
        msg.textContent = text;
        msg.className = `message ${type}`;
        setTimeout(() => msg.className = 'message', 3000);
      }
    }
  </script>
</body>
</html>
