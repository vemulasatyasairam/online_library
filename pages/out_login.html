<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; background: url("https://static.vecteezy.com/system/resources/previews/000/702/015/non_2x/online-digital-library-education-vector.jpg") no-repeat center/cover; }
    .login-card { width:360px; background: rgba(255,255,255,0.95); padding:28px; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.2); }
    h3{ margin-top:0; text-align:center; font-family:cursive }
    .field{ margin-bottom:12px }
    .field input{ width:100%; height:42px; padding:8px 10px; border-radius:6px; border:1px solid #ddd }
    .btn{ width:100%; height:42px; background:#2563eb; color:#fff; border:none; border-radius:6px; cursor:pointer }
    .small{ font-size:0.9rem; color:#333; margin-top:8px; text-align:center }
    .link{ color:#2563eb; cursor:pointer; text-decoration:underline }
    #otp-area{ display:none; margin-top:10px }
    .hidden{ display:none }
  </style>

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script src="theme.js?v=20260319b"></script>
</head>
<body>
  <div class="login-card">
    <h3>Login</h3>
    <form id="login-form">
      <div class="field"><input id="email" type="email" placeholder="Email" required></div>
      <div class="field"><input id="password" type="password" placeholder="Password" required></div>
      <button class="btn" type="submit">Login</button>
    </form>

    <span id="forgot-link" class="link">Forgot Password</span>

    <div id="otp-area">
      <div class="field"><input id="otp-email" type="email" placeholder="Enter your email to receive OTP"></div>
      <button id="send-otp" class="btn" type="button">Send OTP</button>
      <div id="otp-step" class="hidden">
        <div class="field"><input id="otp-input" type="text" placeholder="Enter OTP"></div>
        <div class="field"><input id="new-password" type="password" placeholder="New password"></div>
        <button id="verify-otp" class="btn" type="button">Verify & Reset</button>
      </div>
      <div id="otp-msg" class="small"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
